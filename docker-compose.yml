version: "3.8"

services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "8081:8081"
    env_file: .env

  agent-service:
    build: ./services/agent-service
    ports:
      - "8082:8082"
    env_file: .env
    depends_on:
      - auth-service

  chat-service:
    build: ./services/chat-service
    ports:
      - "8083:8083"
    env_file: .env
    depends_on:
      - auth-service
      - agent-service

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - auth-service
      - agent-service
      - chat-service
